name: Deploy production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        env:
          CPANEL_SSH_PRIVATE_KEY: ${{ secrets.CPANEL_SSH_PRIVATE_KEY }}
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          CPANEL_PORT: ${{ secrets.CPANEL_PORT }}
        run: |
          test -n "$CPANEL_SSH_PRIVATE_KEY" || (echo "Falta el secret CPANEL_SSH_PRIVATE_KEY" && exit 1)
          test -n "$CPANEL_HOST" || (echo "Falta el secret CPANEL_HOST" && exit 1)
          mkdir -p ~/.ssh
          printf '%s\n' "$CPANEL_SSH_PRIVATE_KEY" > ~/.ssh/cpanel_deploy_key
          chmod 600 ~/.ssh/cpanel_deploy_key
          ssh-keyscan -p "${CPANEL_PORT:-22}" "$CPANEL_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on cPanel
        env:
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          CPANEL_PORT: ${{ secrets.CPANEL_PORT }}
          CPANEL_USER: ${{ secrets.CPANEL_USER }}
          CPANEL_REPO_PATH: ${{ secrets.CPANEL_REPO_PATH }}
          CPANEL_PUBLIC_PATH: ${{ secrets.CPANEL_PUBLIC_PATH }}
          CPANEL_GIT_URL: https://github.com/${{ github.repository }}.git
        run: |
          test -n "$CPANEL_HOST" || (echo "Falta el secret CPANEL_HOST" && exit 1)
          test -n "$CPANEL_USER" || (echo "Falta el secret CPANEL_USER" && exit 1)
          test -n "$CPANEL_REPO_PATH" || (echo "Falta el secret CPANEL_REPO_PATH" && exit 1)
          test -n "$CPANEL_PUBLIC_PATH" || (echo "Falta el secret CPANEL_PUBLIC_PATH" && exit 1)
          ssh -i ~/.ssh/cpanel_deploy_key -p "${CPANEL_PORT:-22}" "$CPANEL_USER@$CPANEL_HOST" "
            set -e
            if git -C '$CPANEL_REPO_PATH' rev-parse --is-inside-work-tree >/dev/null 2>&1; then
              echo 'Repositorio existente detectado. Actualizando main...'
              git -C '$CPANEL_REPO_PATH' remote set-url origin '$CPANEL_GIT_URL'
              cd '$CPANEL_REPO_PATH'
              git pull --ff-only origin main
            else
              mkdir -p \"\$(dirname '$CPANEL_REPO_PATH')\"
              if [ -z \"\$(ls -A '$CPANEL_REPO_PATH')\" ]; then
                echo 'Repositorio ausente o carpeta vacia. Clonando...'
                git clone '$CPANEL_GIT_URL' '$CPANEL_REPO_PATH'
                cd '$CPANEL_REPO_PATH'
              else
                BACKUP_PATH='$CPANEL_REPO_PATH-backup-'\"\$(date +%Y%m%d%H%M%S)\"
                echo 'CPANEL_REPO_PATH existe pero no es un repositorio Git valido. Moviendo a backup...'
                mv '$CPANEL_REPO_PATH' \"\$BACKUP_PATH\"
                git clone '$CPANEL_GIT_URL' '$CPANEL_REPO_PATH'
                cd '$CPANEL_REPO_PATH'
              fi
            fi
            tar --exclude='.git' --exclude='admin/config.php' --exclude='includes/db-config.php' --exclude='.DS_Store' -cf - . | tar -xf - -C '$CPANEL_PUBLIC_PATH'
            mkdir -p '$CPANEL_PUBLIC_PATH/img/jobs'
            chmod 777 '$CPANEL_PUBLIC_PATH/img/jobs'
          "
